name: Post Instagram Carousel

on:
  schedule:
    - cron: '30 2 * * *'    # 8:00 AM IST  (02:30 UTC)
    - cron: '30 13 * * *'   # 7:00 PM IST  (13:30 UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Generate + render but do NOT post to Instagram'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      topic_override:
        description: 'Force a specific topic (leave blank for auto)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  post-carousel:
    name: Generate & Post
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libfreetype6-dev libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Cache fonts
        id: font-cache
        uses: actions/cache@v4
        with:
          path: assets/fonts/
          key: google-fonts-v2

      - name: Download fonts (if not cached)
        if: steps.font-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p assets/fonts
          BASE_M="https://raw.githubusercontent.com/JulietaUla/Montserrat/master/fonts/ttf"
          curl -sL "$BASE_M/Montserrat-ExtraBold.ttf" -o assets/fonts/Montserrat-ExtraBold.ttf
          curl -sL "$BASE_M/Montserrat-Bold.ttf"      -o assets/fonts/Montserrat-Bold.ttf
          curl -sL "$BASE_M/Montserrat-Regular.ttf"   -o assets/fonts/Inter-Regular.ttf
          curl -sL "https://raw.githubusercontent.com/google/fonts/main/ofl/notoemoji/NotoEmoji%5Bwght%5D.ttf" \
               -o assets/fonts/NotoEmoji-Regular.ttf
          echo "Fonts:"
          ls -lh assets/fonts/

      - name: Restore session cache
        uses: actions/cache@v4
        with:
          path: data/
          key: ig-session-${{ github.run_id }}
          restore-keys: ig-session-

      - name: Create data dirs
        run: mkdir -p data/slides

      - name: Run carousel maker
        id: run
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          INSTA_USERNAME:  ${{ secrets.INSTA_USERNAME }}
          INSTA_PASSWORD:  ${{ secrets.INSTA_PASSWORD }}
          INSTA_HANDLE:    ${{ secrets.INSTA_HANDLE }}
          INSTA_SESSION:   ${{ secrets.INSTA_SESSION }}
          DRY_RUN:         ${{ github.event.inputs.dry_run || 'false' }}
          TOPIC_OVERRIDE:  ${{ github.event.inputs.topic_override || '' }}
        run: python main.py 2>&1 | tee data/run.log

      - name: Check if session was refreshed
        if: always()
        run: |
          NEW_SESSION=$(grep "^NEW_SESSION_B64=" data/run.log 2>/dev/null | tail -1 | cut -d= -f2-)
          if [ -n "$NEW_SESSION" ]; then
            echo "::warning::Session was refreshed. Copy the NEW_SESSION_B64 value from the logs and update the INSTA_SESSION secret manually."
          fi

      - name: Save session cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/
          key: ig-session-${{ github.run_id }}

      - name: Upload slides on dry-run (preview)
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: carousel-preview-${{ github.run_id }}
          path: data/slides/
          retention-days: 3

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            data/run.log
            data/debug_*.png
          retention-days: 2

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-run-${{ github.run_id }}
          path: data/run.log
          retention-days: 7
